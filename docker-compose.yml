version: '3.9'

services:
  db:
    image: postgres:16
    container_name: content_saas_db
    environment:
      POSTGRES_DB: content_saas
      POSTGRES_USER: content_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: content_saas_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
